services:
  mysql:
    profiles:
      - local-db
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MARIADB_DATABASE: ${MYSQL_DATABASE:-bazi}
      MARIADB_USER: ${MYSQL_USER:-bazi}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD:-bazi123456}
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/bazi_all.sql:/docker-entrypoint-initdb.d/01-bazi_all.sql:ro
      - ./sql/create_contact_record_table.sql:/docker-entrypoint-initdb.d/02-create_contact_record_table.sql:ro
      - ./sql/fix_achievement_compatibility.sql:/docker-entrypoint-initdb.d/03-fix_achievement_compatibility.sql:ro
      - ./sql/update_achievement_points.sql:/docker-entrypoint-initdb.d/04-update_achievement_points.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h 127.0.0.1 -u$$MARIADB_USER -p$$MARIADB_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: Asia/Shanghai
      SERVER_PORT: 8088
      DB_URL: jdbc:mysql://${DB_HOST:-host.docker.internal}:${DB_PORT:-3306}/${DB_NAME:-bazi}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-to-a-secure-32-byte-minimum-value}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_ENDPOINT: ${DEEPSEEK_API_ENDPOINT:-https://api.deepseek.com/v1/chat/completions}
      ONE_API_KEY: ${ONE_API_KEY:-}
      ONE_API_BASE_URL: ${ONE_API_BASE_URL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_BASE_URL: ${GEMINI_API_BASE_URL:-}
      MCP_ENABLED: ${MCP_ENABLED:-false}
    ports:
      - "${BACKEND_PORT:-8088}:8088"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_PANGLE_SLOT_ID: ${VITE_PANGLE_SLOT_ID:-}
        VITE_PANGLE_CAROUSEL_SLOT_ID: ${VITE_PANGLE_CAROUSEL_SLOT_ID:-}
        VITE_PANGLE_SPLASH_SLOT_ID: ${VITE_PANGLE_SPLASH_SLOT_ID:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:8080"

volumes:
  mysql-data:
