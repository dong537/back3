# 仅IP访问的核心配置
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /opt/bazi-app/frontend;
    index index.html;
    access_log /var/log/nginx/ip_access_access.log;
    error_log /var/log/nginx/ip_access_error.log;

    # 静态资源处理
    location ~* \.(js|css|html|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf|otf|eot)$ {
        expires max;
        add_header Cache-Control "public, immutable";
    }

    # SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ✅ SSE 流式响应特殊配置
    location /api/deepseek/reasoning-stream {
        proxy_pass http://localhost:8088;
        # ✅ SSE 流式响应配置
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_set_header Transfer-Encoding chunked;
        # 禁用超时
        proxy_read_timeout 3600s;
        proxy_connect_timeout 3600s;
        proxy_send_timeout 3600s;
        # 保留原始请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 代理到后端
    location /api {
        proxy_pass http://localhost:8088;
        # ✅ 标准 API 配置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # ✅ 允许所有HTTP方法（GET, POST, PUT, DELETE等）
        proxy_method $request_method;
        
        # ✅ 请求体大小限制（根据实际需求调整）
        client_max_body_size 10M;
        
        # ✅ 代理缓冲设置
        proxy_buffering off;
        proxy_request_buffering off;
        
        # ✅ CORS 支持（如果需要）
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        
        # ✅ 处理OPTIONS预检请求
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        
        # ✅ 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # MCP 服务代理
    location /mcp {
        proxy_pass http://localhost:3000;
    }
}