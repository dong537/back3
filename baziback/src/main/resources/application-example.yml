# 应用配置示例文件
# 复制此文件为 application.yml 并填入实际值
# 或使用环境变量覆盖

spring:
  application:
    name: demo1
  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true
  codec:
    max-in-memory-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/bazi?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  messages:
    encoding: UTF-8

mybatis:
  configuration:
    map-underscore-to-camel-case: true

jackson:
  serialization:
    write-dates-as-timestamps: false
  deserialization:
    adjust-dates-to-context-time-zone: false
  time-zone: Asia/Shanghai
  date-format: yyyy-MM-dd HH:mm:ss

# 服务器配置
server:
  port: ${SERVER_PORT:8088}

# JWT配置
jwt:
  secret: ${JWT_SECRET:change-this-jwt-secret-to-a-secure-32-byte-minimum-value}
  expiration: ${JWT_EXPIRATION:86400000}

# MCP相关配置
mcp:
  enabled: ${MCP_ENABLED:false}
  bazi:
    api:
      endpoint: ${MCP_BAZI_ENDPOINT:https://mcp.api-inference.modelscope.net/43918d5be1c140/mcp}
      api-key: ${MCP_BAZI_KEY}  # 必须通过环境变量提供
    max-retry: 2
    retry-interval-seconds: 1
  ziwei:
    api:
      endpoint: ${MCP_ZIWEI_ENDPOINT:https://mcp.api-inference.modelscope.net/449d88faac0b4c/mcp}
      api-key: ${MCP_ZIWEI_KEY}  # 必须通过环境变量提供
    max-retry: 3
    retry-interval-seconds: 1
  star:
    enabled: ${MCP_STAR_ENABLED:false}
    api:
      endpoint: ${MCP_STAR_ENDPOINT:https://mcp.api-inference.modelscope.net/8e403bb31c6c48/mcp}
      api-key: ${MCP_STAR_KEY}  # 必须通过环境变量提供
    max-retry: 3
    retry-interval-seconds: 1

# DeepSeek AI配置
deepseek:
  api:
    key: ${DEEPSEEK_API_KEY}  # 必须通过环境变量提供
    endpoint: ${DEEPSEEK_API_ENDPOINT:https://api.deepseek.com/v1/chat/completions}
  model: deepseek-chat
  temperature: 0.5

gemini:
  api:
    key: ${ONE_API_KEY:${GEMINI_API_KEY:your_one_api_key_here}}
    base-url: ${ONE_API_BASE_URL:${GEMINI_API_BASE_URL:http://104.197.139.51:3000/v1}}
  text-model: ${ONE_API_GEMINI_MODEL:${GEMINI_TEXT_MODEL:gemini-3-flash-preview}}
  vision-model: ${ONE_API_GEMINI_VISION_MODEL:${GEMINI_VISION_MODEL:gemini-3-flash-preview}}
  vision-models: ${ONE_API_GEMINI_VISION_MODELS:${GEMINI_VISION_MODELS:gemini-2.0-flash,gemini-2.0-flash-exp,gemini-2.0-flash-lite-preview-02-05,gemini-2.0-flash-thinking-exp-01-21,gemini-2.0-pro-exp-02-05,gemini-3-flash-preview,gemini-3-pro-preview,gemini-3-pro-image-preview,gemini-3.1-pro-preview}}
  image-model: ${ONE_API_GEMINI_IMAGE_MODEL:${GEMINI_IMAGE_MODEL:${ONE_API_GEMINI_VISION_MODEL:${GEMINI_VISION_MODEL:gemini-3-pro-image-preview}}}}
  image-models: ${ONE_API_GEMINI_IMAGE_MODELS:${GEMINI_IMAGE_MODELS:gemini-2.0-flash,gemini-2.0-flash-exp,gemini-2.0-flash-lite-preview-02-05,gemini-2.0-flash-thinking-exp-01-21,gemini-2.0-pro-exp-02-05,gemini-3-flash-preview,gemini-3-pro-preview,gemini-3-pro-image-preview,gemini-3.1-pro-preview}}
  vision-payload-formats: ${ONE_API_GEMINI_VISION_PAYLOAD_FORMATS:${GEMINI_VISION_PAYLOAD_FORMATS:openai-image-url,openai-image-url-string}}
  temperature: ${GEMINI_TEMPERATURE:0.2}
  max-tokens: ${GEMINI_MAX_TOKENS:2000}
  max-image-bytes: ${GEMINI_MAX_IMAGE_BYTES:5242880}

scene-image:
  provider: ${SCENE_IMAGE_PROVIDER:${IMAGE_PROVIDER:one-api-chat-completions}}
  protocol: ${SCENE_IMAGE_PROTOCOL:${IMAGE_PROTOCOL:chat-completions}}
  api:
    key: ${SCENE_IMAGE_API_KEY:${IMAGE_API_KEY:${ONE_API_IMAGE_KEY:${ONE_API_KEY:${GEMINI_API_KEY:your_one_api_key_here}}}}}
    base-url: ${SCENE_IMAGE_API_BASE_URL:${IMAGE_API_BASE_URL:${ONE_API_BASE_URL:${GEMINI_API_BASE_URL:http://104.197.139.51:3000/v1}}}}
  model: ${SCENE_IMAGE_MODEL:${IMAGE_MODEL:${ONE_API_GEMINI_IMAGE_MODEL:${GEMINI_IMAGE_MODEL:gemini-3-pro-image-preview}}}}
  models: ${SCENE_IMAGE_MODELS:${IMAGE_MODELS:${ONE_API_GEMINI_IMAGE_MODELS:${GEMINI_IMAGE_MODELS:gemini-3-pro-image-preview}}}}
  response-format: ${SCENE_IMAGE_RESPONSE_FORMAT:${IMAGE_RESPONSE_FORMAT:b64_json}}
  size: ${SCENE_IMAGE_SIZE:${IMAGE_SIZE:1024x1024}}
  count: ${SCENE_IMAGE_COUNT:${IMAGE_COUNT:1}}
  chat-max-tokens: ${SCENE_IMAGE_CHAT_MAX_TOKENS:${IMAGE_CHAT_MAX_TOKENS:4096}}

# 应用配置
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  debug: ${APP_DEBUG:false}
  free-features: ${APP_FREE_FEATURES:true}

# 日志级别配置
logging:
  level:
    com:
      example:
        demo: ${LOG_LEVEL:INFO}  # 生产环境使用 INFO
    org:
      springframework:
        web: ${LOG_LEVEL:INFO}
  charset:
    console: UTF-8
