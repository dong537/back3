# 应用配置示例文件
# 复制此文件为 application.yml 并填入实际值
# 或使用环境变量覆盖

spring:
  application:
    name: demo1
  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/bazi?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}  # 必须通过环境变量提供
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  messages:
    encoding: UTF-8

mybatis:
  configuration:
    map-underscore-to-camel-case: true

jackson:
  serialization:
    write-dates-as-timestamps: false
  deserialization:
    adjust-dates-to-context-time-zone: false
  time-zone: Asia/Shanghai
  date-format: yyyy-MM-dd HH:mm:ss

# 服务器配置
server:
  port: ${SERVER_PORT:8088}

# JWT配置
jwt:
  secret: ${JWT_SECRET}  # 必须通过环境变量提供，至少32字符
  expiration: ${JWT_EXPIRATION:86400000}

# MCP相关配置
mcp:
  bazi:
    api:
      endpoint: ${MCP_BAZI_ENDPOINT:https://mcp.api-inference.modelscope.net/43918d5be1c140/mcp}
      api-key: ${MCP_BAZI_KEY}  # 必须通过环境变量提供
    max-retry: 2
    retry-interval-seconds: 1
  ziwei:
    api:
      endpoint: ${MCP_ZIWEI_ENDPOINT:https://mcp.api-inference.modelscope.net/449d88faac0b4c/mcp}
      api-key: ${MCP_ZIWEI_KEY}  # 必须通过环境变量提供
    max-retry: 3
    retry-interval-seconds: 1
  star:
    api:
      endpoint: ${MCP_STAR_ENDPOINT:https://mcp.api-inference.modelscope.net/8e403bb31c6c48/mcp}
      api-key: ${MCP_STAR_KEY}  # 必须通过环境变量提供
    max-retry: 3
    retry-interval-seconds: 1

# DeepSeek AI配置
deepseek:
  api:
    key: ${DEEPSEEK_API_KEY}  # 必须通过环境变量提供
    endpoint: ${DEEPSEEK_API_ENDPOINT:https://api.deepseek.com/v1/chat/completions}
  model: deepseek-chat
  temperature: 0.5

gemini:
  api:
    key: ${GEMINI_API_KEY}  # 必须通过环境变量提供
    endpoint: ${GEMINI_API_ENDPOINT:https://generativelanguage.googleapis.com/v1beta/models}
  model: ${GEMINI_MODEL:gemini-1.5-flash}
  max-image-bytes: ${GEMINI_MAX_IMAGE_BYTES:5242880}

# 应用配置
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  debug: ${APP_DEBUG:false}

# 日志级别配置
logging:
  level:
    com:
      example:
        demo: ${LOG_LEVEL:INFO}  # 生产环境使用 INFO
    org:
      springframework:
        web: ${LOG_LEVEL:INFO}
  charset:
    console: UTF-8
