spring:
  application:
    name: demo1
  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true
  webflux:
    base-path: /
  codec:
    max-in-memory-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/bazi?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  messages:
    encoding: UTF-8

mybatis:
  configuration:
    map-underscore-to-camel-case: true

jackson:
  serialization:
    write-dates-as-timestamps: false
  deserialization:
    adjust-dates-to-context-time-zone: false
  time-zone: Asia/Shanghai
  date-format: yyyy-MM-dd HH:mm:ss

server:
  port: ${SERVER_PORT:8088}
  netty:
    connection-timeout: 60s

jwt:
  secret: ${JWT_SECRET:change-this-jwt-secret-to-a-secure-32-byte-minimum-value}
  expiration: ${JWT_EXPIRATION:86400000}

mcp:
  enabled: ${MCP_ENABLED:false}
  bazi:
    api:
      endpoint: ${MCP_BAZI_ENDPOINT:https://mcp.api-inference.modelscope.net/43918d5be1c140/mcp}
      api-key: ${MCP_BAZI_KEY:}
    max-retry: 2
    retry-interval-seconds: 1
  star:
    enabled: ${MCP_STAR_ENABLED:false}
    api:
      endpoint: ${MCP_STAR_ENDPOINT:https://mcp.api-inference.modelscope.net/8e403bb31c6c48/mcp}
      api-key: ${MCP_STAR_KEY:}
    max-retry: 3
    retry-interval-seconds: 1

