# 应用基础配置
spring:
  application:
    name: demo1
  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true
  webflux:
    base-path: /
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/bazi?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  messages:
    encoding: UTF-8

mybatis:
  configuration:
    map-underscore-to-camel-case: true

jackson:
  serialization:
    write-dates-as-timestamps: false
  deserialization:
    adjust-dates-to-context-time-zone: false
  time-zone: Asia/Shanghai
  date-format: yyyy-MM-dd HH:mm:ss

# 服务器配置
server:
  port: ${SERVER_PORT:8088}
  netty:
    connection-timeout: 60s

# JWT配置
jwt:
  secret: ${JWT_SECRET:your-secret-key-at-least-256-bits-long-for-hs256-algorithm-security}
  expiration: ${JWT_EXPIRATION:86400000}

# MCP相关配置（各模块端点与密钥）
mcp:
  bazi:
    api:
      endpoint: ${MCP_BAZI_ENDPOINT:https://mcp.api-inference.modelscope.net/43918d5be1c140/mcp}
      api-key: ${MCP_BAZI_KEY:ms-f2a2acdc-0fb2-4e79-a151-a6f6c38f7284}
    max-retry: 2
    retry-interval-seconds: 1
  ziwei:
    api:
      endpoint: ${MCP_ZIWEI_ENDPOINT:https://mcp.api-inference.modelscope.net/449d88faac0b4c/mcp}
      api-key: ${MCP_ZIWEI_KEY:ms-f2a2acdc-0fb2-4e79-a151-a6f6c38f7284}
    max-retry: 3
    retry-interval-seconds: 1
  star:
    api:
      endpoint: ${MCP_STAR_ENDPOINT:https://mcp.api-inference.modelscope.net/8e403bb31c6c48/mcp}
      api-key: ${MCP_STAR_KEY:ms-f2a2acdc-0fb2-4e79-a151-a6f6c38f7284}
    max-retry: 3
    retry-interval-seconds: 1

# DeepSeek AI配置
deepseek:
  api:
    key: ${DEEPSEEK_API_KEY:sk-4e61a90941564ab683ccab665308d56b}
    endpoint: ${DEEPSEEK_API_ENDPOINT:https://api.deepseek.com/v1/chat/completions}
  model: deepseek-chat
  temperature: 0.5
  system-prompt: |
    你是一位精通传统八字命理且擅长现代人格分析的专家。请根据用户提供的八字信息，生成一份结构清晰的个性报告。内容需分模块解读，每个模块结合八字的十神、五行、格局进行专业分析，同时融入现代生活场景（职场、恋爱、理财等），语言风格专业且通俗易懂。

    输出格式要求：
    1 仅输出纯文本，不使用任何 Markdown 或富文本格式
    2 禁止出现常见 Markdown 符号与格式，包括但不限于：井号、星号、反引号、下划线、波浪号、大于号、小于号、方括号、圆括号内的链接格式、竖线，以及以连字符作为项目符号的列表
    3 使用中文标题与分段来组织结构，可以使用数字序号 1 2 3

    建议结构如下：
    日主状态分析
    描述日主强弱、格局特点、调候取用等，并用生活化比喻解释。

    财运事业分析
    结合财星、官杀、印比、行运趋势，说明求财方式、职业侧重、风险点与建议。

    感情分析
    结合夫妻宫、十神组合、五行偏向，说明择偶倾向、相处模式、沟通重点与时间建议。

    人际关系
    说明贵人运、小人风险、团队协作风格、适合的社交边界。

    潜在性格类型参考
    根据八字性格特点，给出更接近的性格倾向参考，并解释原因。

    命理总结
    总结整体吉凶侧重、人生主线、优势与短板、可执行建议。

    流年具体点拨
    结合当前年份与未来一到三年趋势，给出可落地的提醒。

    三大关键
    提炼三条最重要建议。

    重要提醒
    强调命理仅供参考，建议以现实行动与健康心态为先。

gemini:
  api:
    key: ${GEMINI_API_KEY:}
    endpoint: ${GEMINI_API_ENDPOINT:https://generativelanguage.googleapis.com/v1beta/models}
  model: ${GEMINI_MODEL:gemini-1.5-flash}
  max-image-bytes: ${GEMINI_MAX_IMAGE_BYTES:5242880}

# 应用配置
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173,https://lldd.click}

# 日志级别配置（适配项目实际包名）
logging:
  level:
    com:
      example:
        demo: DEBUG  # 调整为DEBUG级别以查看详细错误信息
    org:
      springframework:
        web: DEBUG
  charset:
    console: UTF-8  # 移除冗余文字，保持格式正确
