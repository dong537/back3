gemini:
  api:
    key: ${ONE_API_KEY:${GEMINI_API_KEY:sk-iOIqwYXa7QKkQpOe3315B0F9E79344Fd98Ae6e12B44a3902}}
    base-url: ${ONE_API_BASE_URL:${GEMINI_API_BASE_URL:https://gemini.agentpit.io/v1}}
  text-model: ${ONE_API_GEMINI_MODEL:${GEMINI_TEXT_MODEL:gemini-3-flash-preview}}
  vision-model: ${ONE_API_GEMINI_VISION_MODEL:${GEMINI_VISION_MODEL:gemini-3-flash-preview}}
  vision-models: ${ONE_API_GEMINI_VISION_MODELS:${GEMINI_VISION_MODELS:gemini-2.0-flash,gemini-2.0-flash-exp,gemini-2.0-flash-lite-preview-02-05,gemini-2.0-flash-thinking-exp-01-21,gemini-2.0-pro-exp-02-05,gemini-3-flash-preview,gemini-3-pro-preview,gemini-3-pro-image-preview,gemini-3.1-pro-preview}}
  image-model: ${ONE_API_GEMINI_IMAGE_MODEL:${GEMINI_IMAGE_MODEL:${ONE_API_GEMINI_VISION_MODEL:${GEMINI_VISION_MODEL:gemini-3-pro-image-preview}}}}
  image-models: ${ONE_API_GEMINI_IMAGE_MODELS:${GEMINI_IMAGE_MODELS:gemini-2.0-flash,gemini-2.0-flash-exp,gemini-2.0-flash-lite-preview-02-05,gemini-2.0-flash-thinking-exp-01-21,gemini-2.0-pro-exp-02-05,gemini-3-flash-preview,gemini-3-pro-preview,gemini-3-pro-image-preview,gemini-3.1-pro-preview}}
  vision-payload-formats: ${ONE_API_GEMINI_VISION_PAYLOAD_FORMATS:${GEMINI_VISION_PAYLOAD_FORMATS:openai-image-url,openai-image-url-string}}
  temperature: ${GEMINI_TEMPERATURE:0.2}
  max-tokens: ${GEMINI_MAX_TOKENS:2000}
  max-image-bytes: ${GEMINI_MAX_IMAGE_BYTES:5242880}

scene-image:
  provider: ${SCENE_IMAGE_PROVIDER:${IMAGE_PROVIDER:one-api-chat-completions}}
  protocol: ${SCENE_IMAGE_PROTOCOL:${IMAGE_PROTOCOL:chat-completions}}
  api:
    key: ${SCENE_IMAGE_API_KEY:${IMAGE_API_KEY:${ONE_API_IMAGE_KEY:${ONE_API_KEY:${GEMINI_API_KEY:sk-iOIqwYXa7QKkQpOe3315B0F9E79344Fd98Ae6e12B44a3902}}}}}
    base-url: ${SCENE_IMAGE_API_BASE_URL:${IMAGE_API_BASE_URL:${ONE_API_BASE_URL:${GEMINI_API_BASE_URL:https://gemini.agentpit.io/v1}}}}
  model: ${SCENE_IMAGE_MODEL:${IMAGE_MODEL:${ONE_API_GEMINI_IMAGE_MODEL:${GEMINI_IMAGE_MODEL:gemini-3-pro-image-preview}}}}
  models: ${SCENE_IMAGE_MODELS:${IMAGE_MODELS:${ONE_API_GEMINI_IMAGE_MODELS:${GEMINI_IMAGE_MODELS:gemini-3-pro-image-preview}}}}
  response-format: ${SCENE_IMAGE_RESPONSE_FORMAT:${IMAGE_RESPONSE_FORMAT:b64_json}}
  size: ${SCENE_IMAGE_SIZE:${IMAGE_SIZE:1024x1024}}
  count: ${SCENE_IMAGE_COUNT:${IMAGE_COUNT:1}}
  chat-max-tokens: ${SCENE_IMAGE_CHAT_MAX_TOKENS:${IMAGE_CHAT_MAX_TOKENS:4096}}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173,https://lldd.click}
  debug: ${APP_DEBUG:false}
  free-features: ${APP_FREE_FEATURES:true}

agentpit:
  oauth:
    authorization-url: ${AGENTPIT_OAUTH_AUTHORIZATION_URL:https://www.agentpit.io/api/oauth/authorize}
    token-url: ${AGENTPIT_OAUTH_TOKEN_URL:https://www.agentpit.io/api/oauth/token}
    userinfo-url: ${AGENTPIT_OAUTH_USERINFO_URL:https://www.agentpit.io/api/oauth/userinfo}
    client-id: ${AGENTPIT_OAUTH_CLIENT_ID:}
    client-secret: ${AGENTPIT_OAUTH_CLIENT_SECRET:}
    callback-url: ${AGENTPIT_OAUTH_CALLBACK_URL:https://destiny.agentpit.io/api/auth/agentpit/callback}
    scope: ${AGENTPIT_OAUTH_SCOPE:profile}
    use-pkce: ${AGENTPIT_OAUTH_USE_PKCE:false}

logging:
  level:
    com.example.demo: DEBUG
    org.springframework.web: DEBUG
  charset:
    console: UTF-8
